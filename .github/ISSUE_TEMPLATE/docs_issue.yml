name: Documentation Issue
description: Report an issue with documentation
title: "[Docs]: "
labels: ["documentation"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a documentation issue! Please fill out the information below.

  - type: textarea
    id: description
    attributes:
      label: Describe the issue
      description: A clear and concise description of what is wrong with the documentation.
    validations:
      required: true

  - type: textarea
    id: location
    attributes:
      label: Location
      description: Where did you find the issue? Provide a link or file path.
      placeholder: "e.g., /guide/, README.md, etc."
    validations:
      required: true

  - type: textarea
    id: suggestion
    attributes:
      label: Suggested fix
      description: If you know how to fix it, describe the correction.

  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: Add any other context about the documentation issue here.
