name: Help Wanted
description: Get help with a problem or question
title: "[Help]: "
labels: ["help wanted"]
body:
  - type: markdown
    attributes:
      value: |
        Need help with something? Please fill out the information below.

  - type: textarea
    id: description
    attributes:
      label: Describe your problem
      description: A clear and concise description of what you need help with.
    validations:
      required: true

  - type: textarea
    id: what_tried
    attributes:
      label: What have you tried?
      description: Describe what you've already tried.

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Provide details about your environment.
      placeholder: |
        - OS: e.g., Windows 11, macOS, Ubuntu
        - Node version:
        - Bun version:
        - Browser:
    validations:
      required: true

  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: Add any other context, screenshots, or code snippets here.
